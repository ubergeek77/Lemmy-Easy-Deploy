name: Update Lemmy Versions

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest Lemmy versions
        id: get-versions
        run: |
          chmod +x .github/get-lemmy-versions.sh
          cd .github
          ./get-lemmy-versions.sh

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/.backend_version .github/.frontend_version
          if git diff --staged --quiet; then
            echo "No new Lemmy versions"
          else
            git commit -m "chore: update Lemmy versions to backend=${{ steps.get-versions.outputs.LATEST_BACKEND }}, frontend=${{ steps.get-versions.outputs.LATEST_FRONTEND }}"
            git push
          fi
